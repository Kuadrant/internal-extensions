apiVersion: extensions.kuadrant.io/v1alpha1
kind: PipelinePolicy
metadata:
  name: my-pipeline
  namespace: kuadrant
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: toystore
  actionMethods:
    - name: assess-threat
      url: "grpc://threat-assessment-service.security.svc.cluster.local:8080"
      service: "threat.v1.ThreatAssessmentService"
      method: "AssessRequest"
      messageTemplate: "threat.v1.ThreatRequest{uri: request.path, source_ip: source.address}"
  request:
    - type: deny
      predicate: 'request.url_path == "/blocked"'
      withStatus: 403
      withBody: "Request blocked"
    - type: grpc_method
      predicate: '"x-assess-threat" in request.headers'
      method: assess-threat
      var: threatResponse
    - type: fail
      predicate: "threatResponse.threat_level < 0"
      logMessage: "threat assessment returned invalid threat_level"
    - type: deny
      predicate: "threatResponse.threat_level >= 5"
      withStatus: 403
      withHeaders: '[["x-threat-blocked", "true"], ["x-threat-level", string(threatResponse.threat_level)]]'
      withBody: "Request blocked: threat level exceeds threshold"
  response:
    - type: add_headers
      predicate: '"x-assess-threat" in request.headers'
      headersToAdd: '[["x-threat-assessed", "true"]]'
    - type: add_headers
      predicate: '!("x-assess-threat" in request.headers)'
      headersToAdd: '[["x-threat-assessed", "false"]]'
    - type: add_headers
      headersToAdd: '[["x-threat-threshold", "5"]]'
